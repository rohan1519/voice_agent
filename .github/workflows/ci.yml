name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check (JS syntax via Node)
        run: node --check frontend/app.js backend/agent/stateManager.js backend/agent/evaluator.js

      - name: Run test suite
        run: npm test

      # Auto-open a GitHub Issue when CI fails on push to main/development
      - name: Create issue on failure
        if: failure() && github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const sha = context.sha.substring(0, 7);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `CI failed on ${context.ref_name} @ ${sha}`,
              body: [
                '## CI Failure',
                '',
                `**Branch:** \`${context.ref_name}\``,
                `**Commit:** \`${sha}\``,
                `**Run:** [View full logs](${runUrl})`,
                '',
                '**Failed steps** — check the run link above for exact output.',
                '',
                '> This issue was auto-created by the CI workflow. Close it once the failure is resolved.',
              ].join('\n'),
              labels: ['ci-failure', 'bug'],
            });
